<!DOCTYPE html>
<html>
<head>
  <title>CMX Flight Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Houghton County Memorial Airport (CMX) Flight Tracker</h1>
  </header>

  <section id="top-section">
    <div id="weather" class="card">Loading weather...</div>
    <div id="webcam" class="card">
      <img src="https://via.placeholder.com/400x300?text=CMX+Webcam" alt="CMX Webcam" width="100%">
    </div>
  </section>

  <!-- Flight Date Tabs -->
  <section id="date-tabs" class="card">
    <button class="date-btn" data-offset="-2">2 Days Ago</button>
    <button class="date-btn" data-offset="-1">Yesterday</button>
    <button class="date-btn" data-offset="0" id="today-btn">Today</button>
    <button class="date-btn" data-offset="1">Tomorrow</button>
    <input type="date" id="search-date">
    <button id="search-btn">Search</button>
  </section>

  <section id="flights-section">
    <div id="arrivals" class="card"><h2>Arrivals</h2></div>
    <div id="departures" class="card"><h2>Departures</h2></div>
  </section>

  <footer>
    <p>Last updated: <span id="last-updated">--:--</span></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
